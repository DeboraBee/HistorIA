<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HistorIA - Autenticação</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .auth-container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-header h1 {
      color: #667eea;
      margin: 0;
      font-size: 2.5rem;
    }

    .auth-header p {
      color: #666;
      margin: 0.5rem 0 0 0;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 1rem;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .btn {
      flex: 1;
      padding: 0.75rem;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #667eea;
      border: 2px solid #667eea;
    }

    .btn-secondary:hover {
      background: #667eea;
      color: white;
    }

    .toggle-form {
      text-align: center;
      margin-top: 1rem;
      color: #666;
    }

    .toggle-form a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .toggle-form a:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 1rem;
      border-radius: 5px;
      margin-bottom: 1rem;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }

    .alert-success {
      background: #efe;
      color: #3c3;
      border: 1px solid #cfc;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    .tipo-select {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .tipo-option {
      padding: 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .tipo-option:hover {
      border-color: #667eea;
      background: #f7f7ff;
    }

    .tipo-option.selected {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .tipo-option input {
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <h1>📚 HistorIA</h1>
      <p>Plataforma Educacional Gamificada</p>
    </div>

    <div id="alert" class="alert"></div>

    <!-- SEÇÃO LOGIN -->
    <div id="loginForm" class="form-section active">
      <h2 style="text-align: center; color: #333; margin-bottom: 1.5rem;">Entrar</h2>
      
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="seu@email.com">
      </div>

      <div class="form-group">
        <label for="loginSenha">Senha</label>
        <input type="password" id="loginSenha" placeholder="Sua senha">
      </div>

      <div class="form-buttons">
        <button class="btn btn-primary" onclick="handleLogin()">Entrar</button>
        <button class="btn btn-secondary" onclick="toggleForm()">Cadastrar</button>
      </div>

      <div class="toggle-form">
        Não tem conta? <a onclick="toggleForm()">Crie uma agora</a>
      </div>
    </div>

    <!-- SEÇÃO REGISTRO -->
    <div id="registerForm" class="form-section">
      <h2 style="text-align: center; color: #333; margin-bottom: 1.5rem;">Cadastrar</h2>
      
      <div class="form-group">
        <label>Tipo de Conta</label>
        <div class="tipo-select" id="tipoSelect">
          <div class="tipo-option" onclick="selecionarTipo('aluno', this)">
            <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">👨‍🎓</div>
            <div>Aluno</div>
          </div>
          <div class="tipo-option" onclick="selecionarTipo('professor', this)">
            <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">👨‍🏫</div>
            <div>Professor</div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="registerNome">Nome</label>
        <input type="text" id="registerNome" placeholder="Seu nome completo">
      </div>

      <div class="form-group">
        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" placeholder="seu@email.com">
      </div>

      <div class="form-group">
        <label for="registerSenha">Senha</label>
        <input type="password" id="registerSenha" placeholder="Escolha uma senha forte">
      </div>

      <div class="form-group">
        <label for="registerConfirm">Confirmar Senha</label>
        <input type="password" id="registerConfirm" placeholder="Confirme sua senha">
      </div>

      <div class="form-buttons">
        <button class="btn btn-primary" onclick="handleRegister()">Cadastrar</button>
        <button class="btn btn-secondary" onclick="toggleForm()">Voltar</button>
      </div>

      <div class="toggle-form">
        Já tem conta? <a onclick="toggleForm()">Faça login</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/state.js"></script>

  <script>
    let tipoSelecionado = null;

    function toggleForm() {
      document.getElementById('loginForm').classList.toggle('active');
      document.getElementById('registerForm').classList.toggle('active');
      document.getElementById('alert').classList.remove('show');
      limparFormularios();
    }

    function selecionarTipo(tipo, elemento) {
      tipoSelecionado = tipo;
      document.querySelectorAll('.tipo-option').forEach(el => {
        el.classList.remove('selected');
      });
      elemento.classList.add('selected');
    }

    function mostrarAlerta(mensagem, tipo) {
      const alert = document.getElementById('alert');
      alert.textContent = mensagem;
      alert.className = `alert show alert-${tipo}`;
      setTimeout(() => {
        alert.classList.remove('show');
      }, 4000);
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const senha = document.getElementById('loginSenha').value;

      if (!email || !senha) {
        mostrarAlerta('❌ Preencha todos os campos', 'error');
        return;
      }

      if (!validarEmail(email)) {
        mostrarAlerta('❌ Email inválido', 'error');
        return;
      }

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();

        if (!res.ok) {
          mostrarAlerta(`❌ ${data.detail || 'Erro no login'}`, 'error');
          return;
        }

        mostrarAlerta('✅ Login realizado com sucesso!', 'success');
        setUsuario(data.data);
        
        setTimeout(() => {
          if (data.data.tipo === 'professor') {
            window.location.href = '/professor.html';
          } else {
            window.location.href = '/aluno.html';
          }
        }, 1000);

      } catch (erro) {
        mostrarAlerta(`❌ Erro: ${erro.message}`, 'error');
      }
    }

    async function handleRegister() {
      const nome = document.getElementById('registerNome').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const senha = document.getElementById('registerSenha').value;
      const confirm = document.getElementById('registerConfirm').value;

      if (!nome || !email || !senha || !confirm) {
        mostrarAlerta('❌ Preencha todos os campos', 'error');
        return;
      }

      if (!validarEmail(email)) {
        mostrarAlerta('❌ Email inválido', 'error');
        return;
      }

      if (senha.length < 6) {
        mostrarAlerta('❌ Senha deve ter no mínimo 6 caracteres', 'error');
        return;
      }

      if (senha !== confirm) {
        mostrarAlerta('❌ As senhas não conferem', 'error');
        return;
      }

      if (!tipoSelecionado) {
        mostrarAlerta('❌ Selecione o tipo de conta', 'error');
        return;
      }

      try {
        const res = await fetch('/auth/registrar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome,
            email,
            senha,
            tipo: tipoSelecionado
          })
        });

        const data = await res.json();

        if (!res.ok) {
          mostrarAlerta(`❌ ${data.detail || 'Erro no cadastro'}`, 'error');
          return;
        }

        mostrarAlerta('✅ Cadastro realizado com sucesso! Faça login agora.', 'success');
        setTimeout(() => {
          toggleForm();
          limparFormularios();
        }, 1500);

      } catch (erro) {
        mostrarAlerta(`❌ Erro: ${erro.message}`, 'error');
      }
    }

    function limparFormularios() {
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginSenha').value = '';
      document.getElementById('registerNome').value = '';
      document.getElementById('registerEmail').value = '';
      document.getElementById('registerSenha').value = '';
      document.getElementById('registerConfirm').value = '';
      tipoSelecionado = null;
      document.querySelectorAll('.tipo-option').forEach(el => {
        el.classList.remove('selected');
      });
    }

    function validarEmail(email) {
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return regex.test(email);
    }

    // Enter para submeter
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        if (document.getElementById('loginForm').classList.contains('active')) {
          handleLogin();
        } else {
          handleRegister();
        }
      }
    });
  </script>
</body>
</html>
