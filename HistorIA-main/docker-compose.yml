services:

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI (admin/admin)
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  auth:
    build: ./services/auth
    ports:
      - "8005:8000"
    volumes:
      - auth_data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  exercicios:
    build: ./services/exercicios
    ports:
      - "8001:8000"
    volumes:
      - exercicios_data:/app/data
    environment:
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      alunos:
        condition: service_started
      trilhas:
        condition: service_started
    restart: unless-stopped

  alunos:
    build: ./services/alunos
    ports:
      - "8002:8000"
    volumes:
      - alunos_data:/app/data
    environment:
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  conteudos:
    build: ./services/conteudos
    ports:
      - "8003:8000"
    restart: unless-stopped

  trilhas:
    build: ./services/trilhas
    ports:
      - "8004:8000"
    volumes:
      - trilhas_data:/app/data
    environment:
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - auth
      - alunos
      - exercicios
      - conteudos
      - trilhas
    restart: unless-stopped

volumes:
  auth_data:
  alunos_data:
  exercicios_data:
  trilhas_data: