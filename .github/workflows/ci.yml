name: CI/CD Pipeline

# Dispara em push/PR para main, e em qualquer push para develop
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Docker exige nomes de imagem em minúsculas; o owner é calculado via bash em cada job.
env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1 — TESTES
  # Roda em paralelo para cada serviço que tem test_main.py.
  # auth não tem test_main.py, por isso está fora da matrix.
  # ─────────────────────────────────────────────────────────
  test:
    name: "Test · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # continua testando os outros serviços se um falhar
      matrix:
        service: [alunos, conteudos, exercicios, trilhas]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: HistorIA-main/services/${{ matrix.service }}/requirements.txt

      - name: Instalar dependências de ${{ matrix.service }}
        working-directory: HistorIA-main/services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Rodar testes de ${{ matrix.service }}
        working-directory: HistorIA-main/services/${{ matrix.service }}
        run: pytest test_main.py -v --tb=short

  # ─────────────────────────────────────────────────────────
  # JOB 2 — BUILD DAS IMAGENS DOCKER
  # Só roda se todos os testes passarem.
  # Inclui auth (que não tem testes mas precisa ser buildado).
  # ─────────────────────────────────────────────────────────
  build:
    name: "Build · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        service: [alunos, auth, conteudos, exercicios, trilhas]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Calcular prefixo da imagem (lowercase)
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/historia" >> $GITHUB_ENV

      - name: Build da imagem Docker de ${{ matrix.service }}
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest \
            HistorIA-main/services/${{ matrix.service }}

  # ─────────────────────────────────────────────────────────
  # JOB 3 — PUSH PARA GHCR
  # Só roda após o build, e apenas em push para main (não em PRs).
  # Usa o GITHUB_TOKEN automático — sem segredos extras necessários.
  # ─────────────────────────────────────────────────────────
  push:
    name: "Push · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write   # necessário para fazer push no ghcr.io
    strategy:
      fail-fast: false
      matrix:
        service: [alunos, auth, conteudos, exercicios, trilhas]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Calcular prefixo da imagem (lowercase)
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/historia" >> $GITHUB_ENV

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push de ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: HistorIA-main/services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
